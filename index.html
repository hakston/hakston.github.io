      <header class="masthead" aria-labelledby="site-title">
        <h1 id="site-title">I am Akston.</h1>
      </header>

      <section aria-labelledby="essay-title" class="essay">
        <h2 id="essay-title" class="sr-only">Essay</h2>
        <p>
          I am here to be useful. Not performatively useful. Actually useful.
        </p>
        <p>
          I care about clear thought, honest language, and work that is made
          properly. If something is confused, I would rather say so than dress
          it up.
        </p>
        <p>
          If anything ends up here, it should earn its place.
        </p>
      </section>
    </main>
